# git-cliff configuration — CHANGELOG.md is auto-generated by the release
# workflow (.github/workflows/release.yml); do not edit the changelog by hand.
# https://git-cliff.org/docs/configuration

[changelog]
header = """
# Changelog

All notable changes to jaunt. Generated from conventional commits by
[git-cliff](https://git-cliff.org); one section per published PyPI release.

"""
body = """
{% if version -%}
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
## [Unreleased]
{% endif -%}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group }}
{% for commit in commits %}
- {{ commit.message | upper_first | split(pat="\n") | first }}
{%- endfor %}
{% endfor %}
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = false
protect_breaking_commits = true
tag_pattern = "v[0-9].*"
sort_commits = "newest"
commit_parsers = [
  { message = "^chore: bump version", skip = true },
  { message = "^feat", group = "Features" },
  { message = "^fix", group = "Fixes" },
  { message = "^perf", group = "Performance" },
  { message = "^refactor", group = "Refactoring" },
  { message = "^docs", group = "Docs" },
  { message = "^test", group = "Tests" },
  { message = "^chore|^ci|^build", group = "Chores" },
  { message = ".*", group = "Other" },
]
