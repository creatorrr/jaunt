# Jaunt-for-TypeScript preview config (schema v2 sketch — see ../DESIGN.md).
#
# TOML stays canonical in the port: config values feed build digests, so the
# format must be static and deterministic (a `jaunt.config.ts` could execute
# arbitrary code during discovery — the exact thing the port bans), and one
# root file can govern mixed Python + TypeScript repos. Editor ergonomics
# (autocomplete, validation, hover docs) come from a published JSON Schema
# via the Even Better TOML / taplo extension, not from code-as-config.
version = 2

# Shared engine config — one section serves every language target.
[codex]
model = "gpt-5.6-sol"
reasoning_effort = "medium"

[semantic_gate]
enabled = true
model = "gpt-5.6-luna"

[target.ts]
source_roots = ["src"]
test_roots = ["tests"]
generated_dir = "__generated__"
runtime = "node>=22.18"   # module.registerHooks + native type-stripping
test_runner = "vitest"

# In a mixed repo, a Python target sits alongside and `jaunt check` gates
# both from the repo root:
#
# [target.py]
# source_roots = ["services/api/src"]
# test_roots = ["services/api/tests"]
